[profile.default]
src             = "src"
out             = "out"
libs            = ["lib"]
script          = "script"
solc            = "0.8.24"
evm_version     = "cancun"
optimizer       = true
optimizer_runs  = 1_000_000   # High runs -> minimum runtime gas at the cost of
                              # slightly higher deployment bytecode. For a
                              # production contract called many times this is
                              # the right trade-off.
via_ir          = true         # Pipeline optimizer: smaller bytecode, fewer
                              # JUMPs, fewer stack spills.

# Auto-verify on Etherscan V2 (unified API, single endpoint for all
# Etherscan-family chains). The V1 endpoints are deprecated as of 2025-09.
# The same ETHERSCAN_API_KEY works for Base, Base Sepolia, Ethereum
# mainnet, and the other 80+ chains supported by V2.
# Docs: https://docs.etherscan.io/v2-migration
# Free plan covers Base Sepolia (chain 84532). Base mainnet (8453) on
# the free tier may return "Free API access is not supported for this
# chain" — upgrade API plan or use `--verifier sourcify` as fallback.
[etherscan]
base         = {key = "${ETHERSCAN_API_KEY}", chain = 8453,  url = "https://api.etherscan.io/v2/api"}
base_sepolia = {key = "${ETHERSCAN_API_KEY}", chain = 84532, url = "https://api.etherscan.io/v2/api"}

# Keep the RPC URLs out of git. Pull them from `.env` at run time.
[rpc_endpoints]
base          = "${BASE_RPC_URL}"
base_sepolia  = "${BASE_SEPOLIA_RPC_URL}"

[fmt]
line_length = 100
tab_width   = 4
bracket_spacing = false
int_types   = "long"
multiline_func_header = "params_first"
quote_style = "double"
